<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Forgot Password</title>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow p-4 border-warning">
            <h4 class="text-center text-warning mb-3">Password Recovery</h4>
            <p class="text-muted small text-center">Enter your username to receive a 6-digit OTP code.</p>
            <form action="/forgot_password" method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username (e.g. hospital)" required>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Send OTP</button>
            </form>
            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none small">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
