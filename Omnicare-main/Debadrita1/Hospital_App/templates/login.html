<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Hospital System</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 border-primary mx-auto" style="max-width: 450px;">
            <h2 class="text-center text-primary mb-2">Hospital</h2>
            <h6 class="text-center text-muted mb-4">Smart Flow Management System</h6>
            
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="fw-bold">Select Role:</label>
                    <select name="role" class="form-select" required>
                        <option value="1">Admin Login</option>
                        <option value="2">Doctor Login</option>
                        <option value="3">Patient Panel (No Password)</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Username">
                </div>
                
                <div class="mb-4">
                    <input type="password" name="password" class="form-control" placeholder="Password">
                    <div class="text-end mt-1">
                        <a href="/forgot_password" class="text-decoration-none small text-danger">Forgot Password?</a>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold fs-5">Enter System</button>
            </form>
        </div>
    </div>
</body>
</html>
