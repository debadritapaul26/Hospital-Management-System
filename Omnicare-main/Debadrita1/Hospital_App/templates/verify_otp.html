<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Verify OTP</title>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow p-4 border-success">
            <h4 class="text-center text-success mb-3">Enter OTP</h4>
            <div class="alert alert-info small text-center">
                Please check your Python Terminal window! The 6-digit OTP has been printed there.
            </div>
            <form action="/verify_otp" method="POST">
                <input type="text" name="otp" class="form-control mb-3 text-center fw-bold fs-4" placeholder="------" maxlength="6" required>
                <button type="submit" class="btn btn-success w-100 fw-bold">Verify Code</button>
            </form>
        </div>
    </div>
</body>
</html>
