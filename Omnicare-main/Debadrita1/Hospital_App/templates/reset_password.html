<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Reset Password</title>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow p-4 border-primary">
            <h4 class="text-center text-primary mb-3">Create New Password</h4>
            <p class="text-muted small text-center">Your OTP was verified. Please enter your new password below.</p>
            <form action="/reset_password" method="POST">
                <input type="password" name="new_password" class="form-control mb-3" placeholder="New Password" required>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Update Password</button>
            </form>
        </div>
    </div>
</body>
</html>
